name: Auto Sports News Update

on:
  schedule:
    - cron: '0 * * * *' # এটি প্রতি ১ ঘণ্টা পরপর নিজে থেকে নিউজ আপডেট করবে
  workflow_dispatch: # এটি থাকলে আপনি নিজেও ম্যানুয়ালি রান করতে পারবেন

jobs:
  build:
    runs-on: ubuntu-latest
    
    # এটি সবচেয়ে গুরুত্বপূর্ণ অংশ (যাতে ফাইল এডিট করে পুশ করতে পারে)
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install rss-parser

      - name: Fetch and Update News
        run: node fetch_news.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Kajju027"
          git config --global user.email "kajju3864@gmail.com"
          git add index.html
          # যদি কোনো পরিবর্তন না থাকে তবে এরর দেবে না
          git commit -m "Automated News Update [Skip CI]" || echo "No changes to commit"
          git push
          
