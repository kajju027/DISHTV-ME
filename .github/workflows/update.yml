name: Auto Sports News Update

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Dependencies
        run: npm install rss-parser

      - name: Fetch and Update News
        run: node fetch_news.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Kajju027"
          git config --global user.email "kajju3864@gmail.com"
          git add index.html
          git commit -m "Automated News Update BY Sayan" || echo "changes to commit"
          git push
          
