<script>
document.addEventListener("DOMContentLoaded", async function() {
    const TARGET_ID = "Hindi";
    const WHATSAPP_URL = "https://whatsapp.com/channel/0029VaeylYYBPzjVNomWuZ0T";
    
    const frame = document.getElementById("videoFrame");
    const titleHeader = document.getElementById("pageTitle");
    const errorBox = document.getElementById("errorBox");

    // 1. ADVANCED POPUP & REDIRECT SYSTEM
    const hasJoined = localStorage.getItem("user_joined_wa");

    if (!hasJoined) {
        const userAction = confirm("Join our WhatsApp channel for updates and more links?");
        if (userAction) {
            localStorage.setItem("user_joined_wa", "true");
            window.location.href = WHATSAPP_URL;
        } else {
            // No clicked: Auto redirect after 2 minutes
            setTimeout(() => {
                // Double check if they joined in the meantime
                if (localStorage.getItem("user_joined_wa") !== "true") {
                    window.location.href = WHATSAPP_URL;
                }
            }, 120000); 
        }
    }

    // 2. FETCH DATA (STRICTLY FOR "English")
    const jsonSources = [
        "https://sayan-json-official.pages.dev/ID.json",
        "https://allrounderid.pages.dev/id.json"
    ];

    let foundMatch = null;
    for (let url of jsonSources) {
        if (foundMatch) break;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.iframes) {
                foundMatch = data.iframes.find(item => item.id === TARGET_ID);
            }
        } catch (e) { console.warn("Failed fetching JSON"); }
    }

    if (foundMatch) {
        frame.src = foundMatch.iframeSrc;
        titleHeader.innerText = foundMatch.name;
        document.title = foundMatch.name;
    } else {
        errorBox.style.display = "block";
        titleHeader.innerText = "STREAM NOT FOUND";
    }

    // 3. ENHANCED SHARE SYSTEM (COPY + NATIVE SHARE)
    document.getElementById("shareBtn").onclick = async function() {
        const urlToShare = window.location.href;
        
        // Always Copy to Clipboard first
        try {
            await navigator.clipboard.writeText(urlToShare);
        } catch (err) {}

        // Trigger Browser Native Share
        if (navigator.share) {
            try {
                await navigator.share({
                    title: document.title,
                    text: 'Watch this live stream now!',
                    url: urlToShare
                });
            } catch (err) {
                console.log("Share sheet closed");
            }
        } else {
            alert("Link Copied to Clipboard!");
        }
    };

    // 4. LANDSCAPE LOCK ON FULLSCREEN
    document.addEventListener('fullscreenchange', () => {
        if (document.fullscreenElement && screen.orientation) {
            screen.orientation.lock('landscape').catch(() => {});
        }
    });
});
</script>
