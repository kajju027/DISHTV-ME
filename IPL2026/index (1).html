<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #080c14;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --border: rgba(255,255,255,0.08);
      --border-active: rgba(0,212,170,0.6);
      --accent: #00d4aa;
      --accent2: #f0a500;
      --text-primary: #f0f4f8;
      --text-muted: #7a8a99;
      --glass: rgba(10,18,30,0.75);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--bg-deep);
      font-family: 'Inter', sans-serif;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,212,170,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(240,165,0,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }
    .content-wrap { position: relative; z-index: 1; }

    /* Header */
    .site-header {
      background: rgba(8,12,20,0.92);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-badge {
      background: var(--accent2);
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 1px;
    }
    .visitor-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,212,170,0.08);
      border: 1px solid rgba(0,212,170,0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.75rem;
      color: var(--accent);
    }
    .visitor-dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50% { opacity:0.4; transform:scale(0.8); }
    }

    /* Player */
    .player-wrapper {
      position: relative;
      width: 100%;
      background: #000;
      aspect-ratio: 16/9;
      max-height: 62vw;
      overflow: hidden;
    }
    @media (min-width: 768px) { .player-wrapper { max-height: 480px; } }
    .player-wrapper iframe {
      width: 100%; height: 100%;
      border: none;
      display: block;
    }
    .player-overlay-badge {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(220,30,30,0.9);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .live-dot {
      width: 6px; height: 6px;
      background: #fff;
      border-radius: 50%;
      animation: pulse 1.2s infinite;
    }
    .active-channel-name {
      position: absolute;
      bottom: 10px; left: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 0.78rem;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    .fullscreen-btn {
      position: absolute;
      bottom: 10px; right: 10px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      color: #fff;
      width: 34px; height: 34px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
    }
    .fullscreen-btn:hover { background: rgba(0,212,170,0.2); }

    /* Network status */
    .net-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      padding: 3px 10px;
      border-radius: 12px;
      transition: all 0.4s;
    }
    .net-stable { background: rgba(0,200,100,0.12); color: #00c864; border: 1px solid rgba(0,200,100,0.25); }
    .net-slow    { background: rgba(240,165,0,0.12);  color: #f0a500; border: 1px solid rgba(240,165,0,0.3); }
    .net-offline { background: rgba(220,50,50,0.12);  color: #e04040; border: 1px solid rgba(220,50,50,0.25); }
    .net-dot { width:6px; height:6px; border-radius:50%; }
    .net-dot-green  { background:#00c864; animation:pulse 2s infinite; }
    .net-dot-yellow { background:#f0a500; animation:pulse 1s infinite; }
    .net-dot-red    { background:#e04040; }

    /* Social links */
    .social-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      text-decoration: none;
    }
    .btn-telegram { background: rgba(41,182,246,0.12); color: #29b6f6; border: 1px solid rgba(41,182,246,0.25); }
    .btn-whatsapp { background: rgba(37,211,102,0.12); color: #25d366; border: 1px solid rgba(37,211,102,0.25); }
    .social-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    /* Section label */
    .section-label {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* Channel grid */
    .channels-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    @media (min-width: 480px) { .channels-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 768px) { .channels-grid { grid-template-columns: repeat(4, 1fr); } }

    .channel-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }
    .channel-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,212,170,0.04), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .channel-card:hover { border-color: rgba(0,212,170,0.35); background: var(--bg-card-hover); }
    .channel-card:hover::before { opacity: 1; }
    .channel-card.active {
      border-color: var(--border-active);
      background: rgba(0,212,170,0.07);
      box-shadow: 0 0 0 1px rgba(0,212,170,0.2);
    }
    .channel-logo {
      width: 38px; height: 38px;
      border-radius: 8px;
      object-fit: cover;
      background: rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .channel-fallback-logo {
      width: 38px; height: 38px;
      border-radius: 8px;
      background: rgba(0,212,170,0.1);
      border: 1px solid rgba(0,212,170,0.2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .channel-name {
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.2;
      color: var(--text-primary);
    }
    .tap-hint {
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .active-indicator {
      position: absolute;
      top: 6px; right: 6px;
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      display: none;
    }
    .channel-card.active .active-indicator { display: block; }

    /* Extra links section */
    .extra-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }
    .extra-card:hover { border-color: rgba(240,165,0,0.4); background: var(--bg-card-hover); }
    .extra-icon {
      width: 44px; height: 44px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .extra-icon-chat { background: rgba(41,182,246,0.12); border: 1px solid rgba(41,182,246,0.2); }
    .extra-icon-score { background: rgba(240,165,0,0.12); border: 1px solid rgba(240,165,0,0.2); }
    .extra-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    .extra-sub { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

    /* Popup overlay */
    .popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .popup-card {
      background: linear-gradient(135deg, rgba(10,20,35,0.98), rgba(15,25,42,0.98));
      border: 1px solid rgba(240,165,0,0.4);
      border-radius: 18px;
      padding: 28px 24px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(240,165,0,0.12), 0 20px 60px rgba(0,0,0,0.6);
      animation: slideUp 0.35s ease;
      position: relative;
      overflow: hidden;
    }
    .popup-card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(240,165,0,0.6), transparent);
    }
    @keyframes slideUp {
      from { opacity:0; transform:translateY(30px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .popup-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--accent2);
      margin-bottom: 6px;
    }
    .popup-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
    .popup-brand { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
    .popup-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 22px; }
    .popup-join-btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1db954, #25d366);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .popup-join-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }
    .popup-skip-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 6px;
      transition: color 0.2s;
    }
    .popup-skip-btn:hover { color: var(--text-primary); }

    /* Divider */
    .divider { height: 1px; background: var(--border); margin: 4px 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
  </style>
</head>

  <!-- Visitor Counter Script (hidden, reads count) -->
  <div id="sc-counter-hidden" style="display:none;">
    <script type="text/javascript" src="//widget.supercounters.com/ssl/online_i.js"></script>
    <script type="text/javascript">sc_online_i(1732944,"00FFCC","474747");</script>
  </div>

  <script>
    const JSON_URL = 'https://sayan-json-3.pages.dev/loura.json';
    const WA_POPUP_LINK = 'https://whatsapp.com/channel/0029VaeylYYBPzjVNomWuZ0T';

    let channels = [];
    let activeId = null;

    async function loadChannels() {
      try {
        const res = await fetch(JSON_URL);
        const data = await res.json();
        channels = data.iframes.filter(ch => ch.category === 'IPL26');
        renderChannels();
        if (channels.length > 0) selectChannel(channels[0]);
      } catch (e) {
        document.getElementById('channels-grid').innerHTML =
          '<p style="color:var(--text-muted);font-size:0.8rem;grid-column:1/-1;text-align:center;padding:20px;">Unable to load channels. Please refresh.</p>';
      }
    }

    function renderChannels() {
      const grid = document.getElementById('channels-grid');
      grid.innerHTML = channels.map(ch => `
        <div class="channel-card" id="card-${ch.id}" onclick="selectChannel_id('${ch.id}')">
          ${ch.logourl
            ? `<img class="channel-logo" src="${ch.logourl}" alt="${ch.name.trim()}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
               <div class="channel-fallback-logo" style="display:none;">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z"/></svg>
               </div>`
            : `<div class="channel-fallback-logo">
                 <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M10 8l6 4-6 4V8z"/></svg>
               </div>`
          }
          <div>
            <div class="channel-name">${ch.name.trim()}</div>
            <div class="tap-hint">Tap to watch</div>
          </div>
          <span class="active-indicator"></span>
        </div>
      `).join('');
    }

    function selectChannel_id(id) {
      const ch = channels.find(c => c.id === id);
      if (ch) selectChannel(ch);
    }

    function selectChannel(ch) {
      if (activeId) {
        const prev = document.getElementById('card-' + activeId);
        if (prev) prev.classList.remove('active');
      }
      activeId = ch.id;
      const card = document.getElementById('card-' + ch.id);
      if (card) card.classList.add('active');

      document.getElementById('main-iframe').src = ch.iframeSrc;
      document.getElementById('active-channel-name').textContent = ch.name.trim();

      showPopup();
    }

    function showPopup() {
      document.getElementById('wa-popup').style.display = 'flex';
    }
    function closePopup() {
      document.getElementById('wa-popup').style.display = 'none';
    }
    function joinWhatsApp() {
      window.open(WA_POPUP_LINK, '_blank');
      closePopup();
    }

    // Network status monitor
    function updateNetStatus() {
      const badge = document.getElementById('net-status');
      const dot = document.getElementById('net-dot');
      const text = document.getElementById('net-text');

      if (!navigator.onLine) {
        badge.className = 'net-badge net-offline';
        dot.className = 'net-dot net-dot-red';
        text.textContent = 'Offline';
        return;
      }

      const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
      if (conn) {
        const type = conn.effectiveType;
        if (type === '2g' || (conn.downlink && conn.downlink < 0.5)) {
          badge.className = 'net-badge net-slow';
          dot.className = 'net-dot net-dot-yellow';
          text.textContent = 'Reconnecting....';
        } else if (type === '3g' || (conn.downlink && conn.downlink < 2)) {
          badge.className = 'net-badge net-slow';
          dot.className = 'net-dot net-dot-yellow';
          text.textContent = 'Poor';
        } else {
          badge.className = 'net-badge net-stable';
          dot.className = 'net-dot net-dot-green';
          text.textContent = 'Stable';
        }
      } else {
        badge.className = 'net-badge net-stable';
        dot.className = 'net-dot net-dot-green';
        text.textContent = 'Stable';
      }
    }

    window.addEventListener('online', updateNetStatus);
    window.addEventListener('offline', updateNetStatus);
    if (navigator.connection) navigator.connection.addEventListener('change', updateNetStatus);
    setInterval(updateNetStatus, 5000);
    updateNetStatus();

    // Fake visitor counter fallback
    setTimeout(() => {
      const el = document.getElementById('visitor-count');
      if (el && el.textContent === '...') {
        el.textContent = Math.floor(Math.random() * 800 + 400);
      }
    }, 3000);

    // Try to read supercounters value
    window.addEventListener('load', () => {
      setTimeout(() => {
        const sc = document.querySelector('#sc-counter-hidden img, #sc-counter-hidden span');
        if (sc) {
          const val = sc.alt || sc.textContent;
          if (val && !isNaN(parseInt(val))) {
            document.getElementById('visitor-count').textContent = parseInt(val).toLocaleString();
          }
        }
      }, 2500);
    });

    loadChannels();
  </script>
</body>
</html>
