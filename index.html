<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest News | Sayan Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-sub: #555555;
            --accent: #007bff;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
        }

        header {
            padding: 20px;
            text-align: center;
            background: #fff;
            border-bottom: 1px solid #ddd;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .signature {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            font-weight: 800;
            margin-bottom: 5px;
            display: block;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 800;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            padding: 0 15px;
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .news-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            display: block;
        }

        .news-content {
            padding: 20px;
        }

        .news-title {
            font-size: 19px;
            font-weight: 700;
            margin: 0 0 10px 0;
            line-height: 1.4;
            color: var(--text-main);
        }

        .news-desc {
            font-size: 15px;
            color: var(--text-sub);
            line-height: 1.6;
            margin-bottom: 15px;
        }

        .read-more {
            text-decoration: none;
            color: var(--accent);
            font-weight: 600;
            font-size: 14px;
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .news-card img { height: 180px; }
            h1 { font-size: 20px; }
        }
    </style>
</head>
<body>

<header>
    <span class="signature">Powered by Sayan</span>
    <h1>World News Update</h1>
</header>

<div class="container" id="news-list">
    </div>

</body>
</html>
