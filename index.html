<style>
/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html {
  height: 100%;
  height: -webkit-fill-available;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
}

/* Full-screen black body, no scroll */
body {
  width: 100%;
  height: 100%;
  min-height: 100vh;
  min-height: 100dvh;
  min-height: -webkit-fill-available;
  background: #000;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}

/* ── Main iframe: true fullscreen, hidden until stream loads ── */
#main-iframe {
  position: fixed;
  top: 0; left: 0;
  width: 100vw;
  height: 100vh;
  height: 100dvh;
  border: none;
  display: block;
  visibility: hidden;
  z-index: 1;
}

/* ── Logo: fixed top-left corner ── */
.logo-btn {
  position: fixed;
  top: 10px; left: 10px;
  z-index: 50;
  display: flex; align-items: center;
  text-decoration: none;
  transition: opacity .2s;
}
.logo-btn:hover { opacity: .8; }
.logo-btn img {
  height: 36px; width: auto;
  border-radius: 7px;
  object-fit: contain;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.8));
}

/* ── Loading screen: shown while stream URL is fetching ── */
#loading-screen {
  position: fixed; inset: 0; z-index: 100;
  background: #0a0a0a;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 16px;
}
.loading-ring {
  width: 48px; height: 48px;
  border: 3px solid rgba(255,255,255,.1);
  border-top-color: rgba(255,255,255,.55);
  border-radius: 50%;
  animation: spin .75s linear infinite;
}
.loading-label {
  font-size: 12px; letter-spacing: 1.5px;
  color: rgba(255,255,255,.28);
  text-transform: uppercase;
  font-family: Arial, sans-serif;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Popup overlay: dark blur backdrop ── */
.popup-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.88);
  -webkit-backdrop-filter: blur(14px);
  backdrop-filter: blur(14px);
  display: none;
  align-items: center; justify-content: center;
  padding: 20px;
  z-index: 99999;
}
.popup-overlay.visible { display: flex; }

/* Popup card: gold gradient border + dark inner box */
.popup-wrap {
  position: relative;
  width: 100%; max-width: 358px;
  padding: 2px;
  background: linear-gradient(145deg, rgba(255,204,0,0.8) 0%, rgba(255,224,80,0.4) 50%, rgba(255,204,0,0.8) 100%);
  border-radius: 18px;
  box-shadow: 0 0 50px rgba(255,204,0,0.14), 0 30px 70px rgba(0,0,0,0.72);
  animation: popIn 0.42s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
@keyframes popIn {
  from { opacity: 0; transform: scale(0.87) translateY(24px); }
  to   { opacity: 1; transform: scale(1)   translateY(0); }
}

.popup-box {
  background: linear-gradient(168deg, #1e1e26 0%, #0e0e13 100%);
  border-radius: 16px;
  padding: 34px 24px 26px;
  text-align: center;
}

/* Popup title */
.popup-title {
  color: #ffcc00;
  font-family: 'Acme', sans-serif;
  font-size: 30px;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

/* Popup body text */
.popup-text {

  line-height: 1.65;
  margin-bottom: 24px;
}
.popup-text b {

/* Shared button base */
.btn-popup {

  -webkit-appearance: none; appearance: none;
  touch-action: manipulation;
}
.btn-popup:active { transform: scale(0.95); }

/* "JOIN NOW" button — green, prominent */

/* ── Error screen: shown when stream ID not found ── */
#error-screen {

  background: #0d0d16;
  display: none;
  align-items: center; justify-content: center;
  padding: 24px;
}
#error-screen.show { display: flex; }

.error-card {
  background: rgba(255,255,255,.04);
  border: 1.5px solid rgba(255,255,255,.1);
  border-radius: 20px;
  padding: 52px 32px 42px;
  max-width: 400px; width: 100%;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,.6);
  animation: popIn .35s cubic-bezier(.34,1.45,.64,1);
}
.error-icon {
  width: 72px; height: 72px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.15);
  background: rgba(255,255,255,.05);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 22px;
}
.error-icon svg {
  width: 36px; height: 36px;

.error-title {

.error-badge {

.error-body {

.error-contact-btn {

}
.error-contact-btn:hover {

  border-color: rgba(255,255,255,.28);

}
.error-contact-btn svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }

/* ── Disable hover effects on touch devices to avoid sticky states ── */
@media (hover: none) {

  .btn-join-main:hover { box-shadow: 0 5px 20px rgba(23,184,35,0.32); }
  .error-contact-btn:hover { background: rgba(255,255,255,.09); transform: none; }
}

<!-- ══ WhatsApp Channel Popup ══
     JOIN NOW  → opens WhatsApp channel in new tab + closes popup
     Already Joined → only closes popup                          -->
<div class="popup-overlay" id="popup" role="dialog" aria-modal="true">
  <div class="popup-wrap">
    <div class="popup-box">
      <div class="popup-title">Follow Us !!</div>

<script>
(function () {
  'use strict';

  /* ════ CONFIG — update these URLs as needed ════ */
  var PRIMARY_JSON   = 'https://sayan-json-3.pages.dev/loura.json';
  var FALLBACK_JSON  = 'https://cors-proxy.cooks.fyi/https://allrounderid2.pages.dev/id.json';
  var CONTACT_LINK   = 'https://wa.me/message/BOF76S5WFJVMN1';
  var WA_CHANNEL     = 'https://whatsapp.com/channel/0029VaeylYYBPzjVNomWuZ0T'; // WhatsApp channel URL
  var RETRY_DELAY_MS = 15000; // auto-retry interval when stream is in error state (ms)
  /* ════════════════════════════════════════════ */

  /* DOM references */
  var iframe     = document.getElementById('main-iframe');
  var loadScreen = document.getElementById('loading-screen');
  var errScreen  = document.getElementById('error-screen');
  var errBadge   = document.getElementById('error-badge');
  var contactBtn = document.getElementById('error-contact-btn');
  var popup      = document.getElementById('popup');
  var joinBtn    = document.getElementById('popupJoinBtn');   // "JOIN NOW"
  var skipBtn    = document.getElementById('popupSkipBtn');   // "Already Joined"

  /* Assign contact link to error screen button */
  contactBtn.href = CONTACT_LINK;

  /* ────────────────────────────────────────────
     POPUP LOGIC
     ─────────────────────────────────────────── */

  /* Show popup on page load */
  popup.classList.add('visible');

  /* Smooth fade-out + hide the popup overlay */
  function closePopup() {
    popup.style.opacity    = '0';
    popup.style.transition = 'opacity .2s';
    setTimeout(function () { popup.style.display = 'none'; }, 220);
  }

  /*
   * JOIN NOW clicked:
   *   1. Open WhatsApp channel in a new tab
   *   2. Close popup after a tiny delay (so the tab opens first)
   */
  joinBtn.addEventListener('click', function () {
    window.open(WA_CHANNEL, '_blank'); // redirect to WhatsApp channel
    setTimeout(closePopup, 200);       // then close the popup
  });

  /*
   * Already Joined clicked:
   *   Only close the popup — no redirect
   */
  skipBtn.addEventListener('click', closePopup);

  /* ────────────────────────────────────────────
     LOADING SCREEN — hide when iframe finishes loading
     ─────────────────────────────────────────── */
  var loaderHidden = false;
  function hideLoader() {
    if (loaderHidden) return;
    loaderHidden = true;
    loadScreen.style.transition = 'opacity .35s';
    loadScreen.style.opacity    = '0';
    iframe.style.visibility     = 'visible';
    setTimeout(function () { loadScreen.style.display = 'none'; }, 370);
  }
  iframe.addEventListener('load', hideLoader);

  /* ────────────────────────────────────────────
     ERROR STATE — show error card + silent retry
     ─────────────────────────────────────────── */
  var retryTimer   = null;
  var currentId    = null;
  var inErrorState = false;

  function showError(id) {
    loadScreen.style.display = 'none';
    iframe.style.visibility  = 'hidden';
    errBadge.textContent     = id ? '"' + id + '"' : '"Unknown"';
    errScreen.classList.add('show');
    inErrorState = true;
    scheduleRetry(id); // start silent background retry
  }

  function hideError() {
    errScreen.classList.remove('show');
    inErrorState = false;
    clearTimeout(retryTimer);
  }

  /* Retry silently in the background — user sees no UI change */
  function scheduleRetry(id) {
    clearTimeout(retryTimer);
    retryTimer = setTimeout(function () {
      fetchAndLoad(id, true);
    }, RETRY_DELAY_MS);
  }

  /* ────────────────────────────────────────────
     FULLSCREEN → auto-landscape on mobile
     ─────────────────────────────────────────── */
  function tryLandscape() {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(function () {});
    }
  }
  function exitLandscape() {
    if (screen.orientation && screen.orientation.unlock) {
      try { screen.orientation.unlock(); } catch (e) {}
    }
  }
  document.addEventListener('fullscreenchange',       onFSChange);
  document.addEventListener('webkitfullscreenchange', onFSChange);
  document.addEventListener('mozfullscreenchange',    onFSChange);
  function onFSChange() {
    var fsEl = document.fullscreenElement
             || document.webkitFullscreenElement
             || document.mozFullScreenElement;
    if (fsEl) { tryLandscape(); } else { exitLandscape(); }
  }

  /* ────────────────────────────────────────────
     URL PARSING — extract stream ID from ?id=, ?raw, or path
     ─────────────────────────────────────────── */
  function getStreamId() {
    var s = window.location.search;
    if (s.indexOf('id=') !== -1) return new URLSearchParams(s).get('id') || null;
    if (s.length > 1) return s.slice(1).trim() || null;
    var parts = window.location.pathname.replace(/\/+$/, '').split('/');
    var last  = parts[parts.length - 1];
    return last || null;
  }

  /* ────────────────────────────────────────────
     STREAM LOADER — match ID in JSON, set iframe src
     ─────────────────────────────────────────── */
  function applyStream(data, id) {
    var item = (data.iframes || []).find(function (x) {
      return x.id === id || x.id === (id || '').trim();
    });
    if (item && item.iframeSrc) {
      iframe.src = item.iframeSrc;
      hideError();
      if (item.hit) { fetch(item.hit).catch(function () {}); } // fire hit tracker
      return true;
    }
    return false; // ID not found in this JSON
  }

  /* Try fallback JSON if primary doesn't have the stream */
  function tryFallback(id) {
    if (FALLBACK_JSON.indexOf('REPLACE') !== -1) { showError(id); return; }
    fetch(FALLBACK_JSON)
      .then(function (r) { return r.json(); })
      .then(function (data) { if (!applyStream(data, id)) showError(id); })
      .catch(function () { showError(id); });
  }

  /* Fetch primary JSON first, fallback on failure */
  function fetchAndLoad(id) {
    fetch(PRIMARY_JSON)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        if (!applyStream(data, id)) tryFallback(id);
      })
      .catch(function () { tryFallback(id); });
  }

  /* ────────────────────────────────────────────
     INIT — parse ID from URL and kick off stream load
     ─────────────────────────────────────────── */
  currentId = getStreamId();
  if (currentId) {
    fetchAndLoad(currentId);
  } else {
    showError(null); // no ID in URL — show error immediately
  }

})();
</script>
