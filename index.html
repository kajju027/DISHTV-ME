<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#080a11">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@5.0.7/dist/controls.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..600;1,9..40,300..400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════
   DESIGN TOKENS
   Deep cinematic dark with refined blue
   ═══════════════════════════════════════ */
:root {
    --bg: #080a11;
    --card: #0e1019;
    --surface: #161925;
    --primary: #5b8def;
    --primary-deep: #3a6ad6;
    --primary-soft: rgba(91,141,239,0.07);
    --text: #e4e8f2;
    --text-sec: #6c7594;
    --text-dim: #3e4560;
    --border: rgba(255,255,255,0.04);
    --border-h: rgba(255,255,255,0.08);
    --red: #ef4444;
    --green: #34d399;
}

/* ═══════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════ */
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px;color-scheme:dark;-webkit-tap-highlight-color:transparent}
body{
    font-family:'DM Sans',system-ui,sans-serif;
    font-weight:400;
    background:var(--bg);
    color:var(--text);
    display:flex;flex-direction:column;align-items:center;
    min-height:100vh;
    padding:1rem 1rem 0;
    overflow-x:hidden;
}

/* Subtle grid texture — adds depth without distraction */
body::before{
    content:'';position:fixed;inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,0.016) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,0.016) 1px,transparent 1px);
    background-size:32px 32px;
    pointer-events:none;z-index:0;
}

/* Hidden container for Supercounters — off-screen, invisible */
#sc-hidden{
    position:fixed;left:-9999px;top:0;
    opacity:0;pointer-events:none;z-index:-1;
}

/* ═══════════════════════════════════════
   LOADING SCREEN
   Ultra-minimal: thin line + small text
   ═══════════════════════════════════════ */
#loadingScreen{
    position:fixed;inset:0;
    background:var(--bg);
    display:flex;flex-direction:column;
    justify-content:center;align-items:center;
    z-index:9999;gap:1rem;
}
.ld-line{
    width:32px;height:1px;
    background:rgba(91,141,239,0.1);
    border-radius:1px;
    position:relative;overflow:hidden;
}
.ld-line::after{
    content:'';position:absolute;top:0;left:0;
    width:10px;height:100%;
    background:var(--primary);
    border-radius:1px;
    animation:ldSlide 1.2s ease-in-out infinite;
}
@keyframes ldSlide{
    0%{transform:translateX(0);opacity:.6}
    50%{transform:translateX(22px);opacity:1}
    100%{transform:translateX(0);opacity:.6}
}
.ld-text{
    font-size:.5rem;letter-spacing:4px;
    text-transform:uppercase;color:var(--text-dim);font-weight:400;
}

/* ═══════════════════════════════════════
   POPUP OVERLAY
   Heavy blur, clean card, spring easing
   ═══════════════════════════════════════ */
.popup-overlay{
    position:fixed;inset:0;
    background:rgba(4,5,9,0.88);
    backdrop-filter:blur(20px);
    display:none;align-items:center;justify-content:center;
    padding:1.25rem;z-index:9999;
}
.popup-overlay.show{display:flex}
.popup-box{
    width:100%;max-width:22rem;
    background:linear-gradient(170deg,var(--surface) 0%,#0b0d15 100%);
    border-radius:1rem;
    padding:2rem 1.5rem 1.8rem;
    border:1px solid var(--border);
    box-shadow:0 24px 64px rgba(0,0,0,0.5);
    text-align:center;
    animation:popReveal .4s cubic-bezier(.22,1,.36,1);
    position:relative;
}
@keyframes popReveal{
    from{opacity:0;transform:translateY(12px) scale(.97)}
    to{opacity:1;transform:none}
}
/* Top-edge light accent */
.popup-box::before{
    content:'';position:absolute;
    top:0;left:15%;right:15%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(91,141,239,0.12),transparent);
}
.pop-icon{
    width:36px;height:36px;
    background:var(--primary-soft);
    border:1px solid rgba(91,141,239,0.08);
    border-radius:9px;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 1rem;
}
.pop-icon i{font-size:.8rem;color:var(--primary);opacity:.7}
.pop-title{
    font-size:1.3rem;font-weight:600;
    color:var(--text);margin-bottom:.5rem;
    letter-spacing:-.3px;
}
.pop-desc{
    font-size:.82rem;color:var(--text-sec);
    line-height:1.7;margin-bottom:1.5rem;
}
.pop-desc b{
    color:#c5cad8;font-size:.9rem;
    font-weight:500;display:block;margin-top:.3rem;
}

/* Popup buttons */
.btn{
    width:100%;padding:.78rem;
    border:none;border-radius:.55rem;
    font-family:'DM Sans',sans-serif;
    cursor:pointer;transition:all .2s ease;
    font-size:.88rem;
}
.btn-join{
    background:var(--primary);color:#fff;
    font-weight:500;
    box-shadow:0 2px 10px rgba(91,141,239,0.18);
    margin-bottom:.45rem;
}
.btn-join:hover{background:var(--primary-deep);box-shadow:0 4px 16px rgba(91,141,239,0.28)}
.btn-join:active{box-shadow:0 1px 4px rgba(91,141,239,0.12)}
.btn-skip{
    background:transparent;color:var(--text-sec);
    font-weight:400;font-size:.78rem;
    border:1px solid var(--border);
}
.btn-skip:hover{color:var(--text);border-color:var(--border-h);background:rgba(255,255,255,0.015)}

/* ═══════════════════════════════════════
   MAIN CONTAINER
   ═══════════════════════════════════════ */
.container{
    width:100%;max-width:50rem;
    opacity:0;transform:translateY(6px);
    animation:contentFade .5s cubic-bezier(.22,1,.36,1) .08s forwards;
    z-index:1;position:relative;
}
@keyframes contentFade{to{opacity:1;transform:none}}

/* ═══════════════════════════════════════
   STREAM HEADER
   ═══════════════════════════════════════ */
.stream-header{
    background:var(--card);
    border:1px solid var(--border);
    padding:.78rem .95rem;border-radius:.6rem;
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:.55rem;
}
.stream-header h1{
    font-size:1rem;font-weight:500;
    white-space:nowrap;overflow:hidden;
    text-overflow:ellipsis;padding-right:.6rem;
    letter-spacing:-.2px;
}
.live-badge{
    background:var(--red);color:#fff;
    padding:.16rem .55rem;border-radius:1rem;
    font-size:.58rem;font-weight:500;
    display:flex;align-items:center;gap:.25rem;
    letter-spacing:.3px;flex-shrink:0;
    animation:livePulse 2.5s ease-in-out infinite;
}
.live-badge i{font-size:.25rem}
@keyframes livePulse{
    0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.3)}
    50%{box-shadow:0 0 0 3px rgba(239,68,68,0)}
}

/* ═══════════════════════════════════════
   VIDEO PLAYER
   Static blue edge — no spinning, no glow
   ═══════════════════════════════════════ */
#player-container{
    width:100%;height:50vh;max-height:35rem;
    background:#000;border-radius:.65rem;
    overflow:hidden;position:relative;
    border:1px solid rgba(91,141,239,0.08);
    box-shadow:0 8px 36px rgba(0,0,0,0.45);
}
.rotate-fallback-notice{
    position:absolute;left:.5rem;bottom:.5rem;z-index:22000;
    background:rgba(0,0,0,.6);backdrop-filter:blur(8px);
    border:1px solid var(--border);
    color:var(--text);padding:.22rem .45rem;
    border-radius:.3rem;font-size:.6rem;display:none;
}
.player-rotated{
    transform-origin:center center;width:100vh;height:100vw;
    position:fixed;top:50%;left:50%;
    transform:translate(-50%,-50%) rotate(90deg);
    z-index:21000;border-radius:0;
}
.view-counter{
    position:absolute;top:.45rem;right:.45rem;
    background:rgba(0,0,0,.45);backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.03);
    border-radius:.3rem;padding:.22rem .45rem;
    z-index:9999;text-align:right;pointer-events:none;
}
.view-counter .name{
    font-size:.48rem;font-weight:500;
    color:rgba(255,255,255,.5);margin-bottom:1px;
    letter-spacing:.2px;text-transform:capitalize;
}
.view-counter .views{
    font-size:.65rem;font-weight:500;color:#fff;
    letter-spacing:.1px;transition:color .3s;
}

/* ═══════════════════════════════════════
   INFO CARDS
   Top-edge highlight on hover for depth
   ═══════════════════════════════════════ */
.info-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:.75rem;
    padding:1rem .95rem;margin-top:.55rem;
    text-align:center;position:relative;
    overflow:hidden;transition:border-color .25s;
}
.info-card:hover{border-color:var(--border-h)}
.info-card::before{
    content:'';position:absolute;
    top:0;left:12%;right:12%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(91,141,239,0.1),transparent);
    opacity:0;transition:opacity .25s;
}
.info-card:hover::before{opacity:1}

.action-title{
    display:flex;align-items:center;justify-content:center;
    gap:6px;margin-bottom:.65rem;color:var(--text);
}
.action-button{
    display:inline-flex;align-items:center;justify-content:center;
    width:100%;padding:.72rem .8rem;
    border-radius:.5rem;background:var(--primary);
    color:white;font-weight:500;font-size:.84rem;
    text-decoration:none;border:none;cursor:pointer;
    transition:all .2s ease;
    box-shadow:0 2px 8px rgba(91,141,239,0.15);
    font-family:'DM Sans',sans-serif;
    letter-spacing:-.1px;
}
.action-button:hover{
    background:var(--primary-deep);
    box-shadow:0 4px 14px rgba(91,141,239,0.25);
}
.action-button:active{box-shadow:0 1px 4px rgba(91,141,239,0.1)}
.action-button svg{width:.85rem;height:.85rem;flex-shrink:0}
.action-button.copied{
    background:var(--green);
    box-shadow:0 2px 8px rgba(52,211,153,0.15);
}

/* ═══════════════════════════════════════
   ERROR PAGE
   2×2 action grid with SVG icons
   ═══════════════════════════════════════ */
.error-container{
    width:100%;max-width:30rem;text-align:center;
    background:linear-gradient(170deg,var(--surface) 0%,#0b0d15 100%);
    border:1px solid var(--border);
    border-radius:1rem;
    padding:2.5rem 1.5rem 2rem;
    position:relative;overflow:hidden;
    box-shadow:0 16px 40px rgba(0,0,0,0.35);
    animation:errReveal .5s cubic-bezier(.22,1,.36,1);
}
.error-container::before{
    content:'';position:absolute;
    top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(91,141,239,0.08),transparent);
}
@keyframes errReveal{
    from{opacity:0;transform:translateY(10px) scale(.98)}
    to{opacity:1;transform:none}
}
.err-icon-wrap{
    width:48px;height:48px;
    background:var(--primary-soft);
    border:1px solid rgba(91,141,239,0.06);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 1.3rem;position:relative;
}
.err-icon-wrap::after{
    content:'';position:absolute;inset:-5px;
    border-radius:50%;
    border:1px solid transparent;
    border-top-color:rgba(91,141,239,0.08);
    animation:errRing 6s linear infinite;
}
@keyframes errRing{to{transform:rotate(360deg)}}
.err-icon-wrap svg{
    width:20px;height:20px;
    stroke:var(--primary);fill:none;
    stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
    animation:errFloat 4s ease-in-out infinite;
}
@keyframes errFloat{
    0%,100%{transform:translateY(0)}
    50%{transform:translateY(-2px)}
}
.err-title{
    font-size:1.15rem;font-weight:600;
    text-transform:uppercase;letter-spacing:3px;
    color:var(--text);margin-bottom:.5rem;
}
.err-desc{
    color:var(--text-sec);font-size:.8rem;
    line-height:1.75;margin-bottom:1.8rem;
    max-width:17rem;margin-left:auto;margin-right:auto;
}
.error-grid{
    display:grid;grid-template-columns:1fr 1fr;gap:.45rem;
}
.error-card{
    display:flex;flex-direction:column;
    align-items:center;gap:.55rem;
    padding:.9rem .4rem .8rem;
    background:var(--card);
    border:1px solid var(--border);
    border-radius:.65rem;
    text-decoration:none;color:var(--text);
    transition:all .2s ease;cursor:pointer;
}
.error-card:hover{
    border-color:rgba(91,141,239,0.12);
    background:rgba(91,141,239,0.02);
    transform:translateY(-1px);
    box-shadow:0 4px 14px rgba(0,0,0,0.2);
}
.error-card-icon{
    width:32px;height:32px;border-radius:8px;
    background:var(--primary-soft);
    border:1px solid rgba(91,141,239,0.05);
    display:flex;align-items:center;justify-content:center;
    transition:all .2s;
}
.error-card:hover .error-card-icon{
    background:rgba(91,141,239,0.1);
    border-color:rgba(91,141,239,0.08);
}
.error-card-icon svg{
    width:14px;height:14px;
    stroke:var(--primary);fill:none;
    stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;
}
.error-card-label{
    font-size:.65rem;font-weight:500;
    color:var(--text-sec);letter-spacing:.2px;
    transition:color .2s;
}
.error-card:hover .error-card-label{color:var(--text)}

/* ═══════════════════════════════════════
   FOOTER
   Custom live counter from Supercounters
   ═══════════════════════════════════════ */
.site-footer{
    position:relative;z-index:5;
    text-align:center;padding:.5rem 1rem 1rem;
}
.footer-live{
    display:inline-flex;align-items:center;
    gap:5px;font-size:.58rem;
    margin-bottom:.35rem;
}
.footer-dot{
    width:4px;height:4px;
    background:var(--green);border-radius:50%;
    animation:footerDot 2.5s ease-in-out infinite;
}
@keyframes footerDot{
    0%,100%{opacity:.7}50%{opacity:.2}
}
#footerCount{
    color:var(--text-sec);font-weight:500;
    font-variant-numeric:tabular-nums;
    min-width:1.2em;text-align:center;
}
.footer-label{color:var(--text-dim);font-weight:400}
.copyright{font-size:.52rem;color:rgba(255,255,255,0.08);letter-spacing:.2px}

/* ═══════════════════════════════════════
   SCROLLBAR & SELECTION
   ═══════════════════════════════════════ */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.03);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.06)}
::selection{background:rgba(91,141,239,0.15);color:#fff}

/* ═══════════════════════════════════════
   ACCESSIBILITY
   ═══════════════════════════════════════ */
@media(prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
@media(max-width:480px){
    .popup-box{padding:1.5rem 1.1rem;max-width:88%}
    .pop-title{font-size:1.15rem}
    .error-container{padding:2rem 1.1rem 1.6rem}
    .err-title{font-size:1rem;letter-spacing:2.5px}
}
</style>
</head>
<body>

<!-- Loading: thin line pulse + muted text -->
<div id="loadingScreen">
    <div class="ld-line"></div>
    <p class="ld-text">Loading</p>
</div>

<!-- Popup: blur overlay + glass card -->
<div class="popup-overlay" id="popup">
    <div class="popup-box">
        <div class="pop-icon"><i class="fa-solid fa-bell"></i></div>
        <div class="pop-title">Support Us !!</div>
        <div class="pop-desc">
            Join our WhatsApp channel <br>
            <b>CRICKET NEWS POINT</b>
            For Instant Updates & Exclusive Links.
        </div>
        <button class="btn btn-join" onclick="joinNow()">JOIN NOW</button>
        <button class="btn btn-skip" onclick="closePopup()">Already Joined</button>
    </div>
</div>

<!-- Hidden Supercounters container — off-screen, invisible to users -->
<div id="sc-hidden" aria-hidden="true">
    <script type="text/javascript" src="//widget.supercounters.com/ssl/online_i.js"></script>
    <script type="text/javascript">sc_online_i(1732944,"00FFCC","474747");</script>
</div>

<!-- Main content area -->
<main class="container">
    <div id="stream-content"></div>
</main>

<!-- Footer: custom counter display + copyright -->
<footer class="site-footer">
    <div class="footer-live">
        <span class="footer-dot"></span>
        <span id="footerCount">--</span>
        <span class="footer-label">Watching now</span>
    </div>
    <div id="poweredBySection"></div>
    <div class="copyright">© 2026 Sayan · All Rights Reserved</div>
</footer>

<script src="script.js"></script>
</body>
</html>
